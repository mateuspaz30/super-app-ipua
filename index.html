
    <!DOCTYPE html>
    <html lang="pt-br">
    <head>
        <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
        <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
        
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
            body { font-family: 'Inter', sans-serif; background-color: #fff; }
            .swiper { width: 100%; height: 160px; border-radius: 24px; }
            .swiper-slide img { width: 100%; height: 100%; object-cover: cover; }
            .swiper-pagination-bullet-active { background: #ea1d2c !important; }
        </style>
    </head>
    <body class="pb-24">
        <header class="p-6 bg-white sticky top-0 z-50 border-b border-gray-50 flex justify-between items-center">
            <span class="text-[#ea1d2c] font-black text-xl italic tracking-tighter">IPUÃ TEM TUDO</span>
            <div class="bg-gray-100 px-3 py-1 rounded-full text-[10px] font-bold text-gray-500 uppercase">Ipuã - SP</div>
        </header>

        <div class="px-6 mt-4">
            <div class="swiper mySwiper shadow-xl shadow-red-50">
                <div class="swiper-wrapper">
    
                    <div class="swiper-slide">
                        <img src="https://i.imgur.com/8Bv9OnM.jpg" alt="Destaque">
                    </div>
        
                    <div class="swiper-slide">
                        <img src="https://i.imgur.com/O6Ld06K.jpg" alt="Destaque">
                    </div>
        
                    <div class="swiper-slide">
                        <img src="https://i.imgur.com/u8M9V6P.jpg" alt="Destaque">
                    </div>
        
                </div>
                <div class="swiper-pagination"></div>
            </div>
        </div>

        <section class="px-6 mt-8 space-y-6">
            <h3 class="font-black text-gray-800 text-lg">Explorar Ipuã</h3>
    
            <div class="flex gap-4 items-center bg-white p-2 border-b border-gray-50">
                <img src="https://i.imgur.com/8Bv9OnM.jpg" class="w-16 h-16 rounded-2xl object-cover shadow-sm">
                <div class="flex-1">
                    <h4 class="font-bold text-gray-800 text-sm">Pizzaria Ki-Delícia</h4>
                    <p class="text-[#ea1d2c] text-[10px] font-bold mt-1 uppercase italic tracking-tighter">Borda Grátis</p>
                </div>
                <div class="text-[#ffb100] text-[10px] font-bold"><i class="fa-solid fa-star"></i> 4.9</div>
            </div>
        
            <div class="flex gap-4 items-center bg-white p-2 border-b border-gray-50">
                <img src="https://i.imgur.com/O6Ld06K.jpg" class="w-16 h-16 rounded-2xl object-cover shadow-sm">
                <div class="flex-1">
                    <h4 class="font-bold text-gray-800 text-sm">Hortifruti Central</h4>
                    <p class="text-[#ea1d2c] text-[10px] font-bold mt-1 uppercase italic tracking-tighter">Quarta da Fruta</p>
                </div>
                <div class="text-[#ffb100] text-[10px] font-bold"><i class="fa-solid fa-star"></i> 4.8</div>
            </div>
        
        </section>

        <script>
            var swiper = new Swiper(".mySwiper", {
                loop: true,
                autoplay: {
                    delay: 3000, // Troca a cada 3 segundos
                    disableOnInteraction: false,
                },
                pagination: {
                    el: ".swiper-pagination",
                    clickable: true,
                },
            });
        </script>
    </body>
    </html>
